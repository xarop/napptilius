<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Napptilius</title>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the full path into a query string so index.html can restore it
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 2).join('/') +
          '/?p=' +
          encodeURIComponent(l.pathname.slice(1) + (l.search ? '&q=' + l.search.slice(1) : '') + l.hash)
      )
    </script>
  </head>
  <body></body>
</html>
