<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/src/assets/naptilius.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Smartphone catalog – Zara Web Challenge" />
  <meta name="theme-color" content="#000000" />
  <link rel="author" href="/napptilius/humans.txt" />
  <title>Mobile Store – Smartphones</title>
  <script>
    // Restore path from 404.html redirect
    ; (function () {
      var p = new URLSearchParams(window.location.search).get('p')
      if (p) {
        var q = new URLSearchParams(window.location.search).get('q')
        window.history.replaceState(
          null,
          null,
          '/' + decodeURIComponent(p) + (q ? '?' + q : '') + window.location.hash
        )
      }
    })()
  </script>
</head>

<body>
  <div id="root">
    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        background: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        z-index: 9999;
      }
      #app-preloader svg {
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }
      #app-preloader p {
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #a3a3a3;
        margin: 0;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div id="app-preloader" aria-label="Loading application" role="status">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-opacity="0.15"/>
        <path d="M12 2v4" stroke-opacity="1"/>
      </svg>
      <p>Mobile Store</p>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
