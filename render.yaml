services:
  - type: web
    name: napptilius
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:fullstack && cd backend && npm install --omit=dev
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_KEY
        sync: false
